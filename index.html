<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>apudding — App Developer</title>
  <style>
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #2a2a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .name { font-size: 28px; font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; }
    .sub { font-size: 15px; color: rgba(255,255,255,0.5); margin-bottom: 40px; }
    .apps { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .app-link {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px 20px;
      color: #fff;
      text-decoration: none;
      width: 280px;
      transition: background 0.15s;
    }
    .app-link:hover { background: rgba(255,255,255,0.12); }
    .app-link img {
      width: 44px;
      height: 44px;
      border-radius: 22%;
      flex-shrink: 0;
      display: block;
    }
    .app-info .app-title { font-size: 16px; font-weight: 600; }
    .app-info .app-desc { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    footer { margin-top: 48px; font-size: 12px; color: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="name">apudding</div>
  <div class="sub">App Developer</div>
  <div class="apps">
    <a href="/talkbridge/" class="app-link">
      <img src="/talkbridge/app-icon.png" alt="TalkBridge app icon">
      <div class="app-info">
        <div class="app-title">TalkBridge</div>
        <div class="app-desc">リアルタイム会話サポート</div>
      </div>
    </a>
  </div>
  <footer>© 2026 apudding</footer>
</body>
</html>
